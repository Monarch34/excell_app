services:
  backend:
    build:
      context: ./backend
    init: true
    ports:
      - "8001:8000"
    environment:
      - ANALYSIS_DB_PATH=/app/data/analysis_app.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:7173,http://localhost
    volumes:
      - ./backend:/app
      - app_data:/app/data
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v3/health')" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    init: true
    ports:
      - "80:80"
    profiles:
      - prod
    depends_on:
      backend:
        condition: service_healthy

  frontend-dev:
    image: node:20-alpine
    init: true
    working_dir: /app
    ports:
      - "7173:5173"
    volumes:
      - ./frontend:/app
      - frontend_dev_node_modules:/app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -lc "if [ ! -d /app/node_modules/.bin ]; then npm ci --no-audit --no-fund; fi && exec npm run dev -- --host"

  backend-test:
    build:
      context: ./backend
    init: true
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./sample_data:/sample_data:ro
      - backend_pip_cache:/root/.cache/pip
    environment:
      - PYTHONPATH=/app
      - ANALYSIS_DB_PATH=/app/analysis_app.db
    profiles:
      - test
    command: >
      sh -lc "pip install --no-cache-dir -r requirements-dev.txt && exec python -m pytest tests -q"

  frontend-test:
    image: node:20-alpine
    init: true
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_test_node_modules:/app/node_modules
    profiles:
      - test
    command: >
      sh -lc "npm ci && exec npm run test -- --run"

  frontend-typecheck:
    image: node:20-alpine
    init: true
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_tc_node_modules:/app/node_modules
    profiles:
      - test
    command: >
      sh -lc "npm ci && exec npm run type-check"

volumes:
  app_data:
  backend_pip_cache:
  frontend_dev_node_modules:
  frontend_test_node_modules:
  frontend_tc_node_modules:
