services:
  backend:
    build:
      context: ./backend
    init: true
    restart: unless-stopped
    environment:
      - ANALYSIS_DB_PATH=/app/data/analysis_app.db
      - CORS_ORIGINS=https://${RAILWAY_PUBLIC_DOMAIN:-localhost}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - STORE_TTL_SECONDS=${STORE_TTL_SECONDS:-3600}
      - STORE_MAX_ENTRIES=${STORE_MAX_ENTRIES:-30}
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v3/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    init: true
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  app_data:
